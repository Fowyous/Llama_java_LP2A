# Game Rules
rules.button.back=\u2190 BACK TO MENU
rules.header.title=GAME RULES
rules.header.subtitle=LAMA \u2014 UTBM Edition
rules.section.objective.title=\uD83C\uDFAF  OBJECTIVE
rules.section.objective.text=Finish the game with as many credits as possible. The honor thresholds are 180 credits (short mode) and 300 credits (long mode).
rules.section.cards.title=\uD83D\uDCB3  THE CARDS
rules.section.cards.text=The game has 7 types of cards: 1, 2, 3, 4, 5, 6, and LAMA (value 10). There are 8 copies of each card, for a total of 56 cards.
rules.section.turns.title=\uD83D\uDD04  TURN PROGRESSION
rules.section.turns.text=Each turn, you can perform one of the following three actions:
rules.bullet.play.title=PLAY A CARD
rules.bullet.play.text=Place a card from your hand on the discard pile. It must have the same value as the top card, or the immediately higher value (e.g.: 3 on 2). Special cases: LAMA is played on a 6, and 1 is played on a LAMA (cycle).

# Bullet Cards
rules.bullet.draw.title=DRAW A CARD
rules.bullet.draw.text=Take a card from the deck and add it to your hand. Your turn ends immediately.

rules.bullet.pass.title=PASS THE ROUND
rules.bullet.pass.text=You leave the current round. You will not play again until the next round. Warning: the cards remaining in your hand will be deducted from your credits!

# Sections
rules.section.endround.title=\uD83D\uDCCA  END OF ROUND
rules.section.endround.text=The round ends when all players have passed or a player empties their hand. The total value of the cards still in hand is deducted from each player's credits.

rules.section.startround.title=\uD83D\uDD04  START OF ROUND
rules.section.startround.text=At the beginning of each round, all players receive +35 credits, including players on a sabbatical semester.

rules.section.jury.title=\u2696  THE JURY
rules.section.jury.text=If you lose 20 credits or more in a single round, you are summoned before the jury. You choose a card from 7 face-down cards (values 1 to 6 and LAMA). You gain the value of the chosen card in credits.

rules.section.cesure.title=\u2708  SABBATICAL SEMESTER
rules.section.cesure.text=If your credits are negative after the jury, you go on a sabbatical semester. You skip the next round but still receive the 35 credits at the start of the round. In 1v1 mode, if both players are on sabbatical, both skip the round simultaneously.

rules.section.eras.title=\uD83C\uDF0D  SEMESTER ABROAD
rules.section.eras.text=If you finish a round without any cards in your hand, you go on a semester abroad. In the next round, you start with only 4 cards instead of 6. This bonus is not cumulative and lasts only one round.

rules.section.modes.title=\uD83C\uDF93  GAME MODES
rules.section.modes.text=Short Mode: 6 rounds. Honorary threshold: 180 credits (equivalent to a bachelor's degree at UTBM).\nLong Mode: 10 rounds. Honorary threshold: 300 credits (master's). DETEC Bonus: if you have \u2265 120 credits at the end of round 4, you receive +30 credits.

rules.section.victory.title=\uD83C\uDFC6  VICTORY
rules.section.victory.text=At the end of the last round, the player with the most credits wins the game. The thresholds of 180 and 300 credits are honorary: they indicate that you are "graduated" but do not determine the winner.



#RulesView
rules.button.back=\u2190 RETOUR AU MENU
rules.header.title=RÈGLES DU JEU
rules.header.subtitle=LAMA \u2014 Édition UTBM
rules.section.objective.title=\uD83C\uDFAF  OBJECTIF
rules.section.objective.text=Terminer la partie avec le plus de crédits possible. Les seuils honorifiques sont 180 crédits (mode court) et 300 crédits (mode long).
rules.section.cards.title=\uD83D\uDCB3  LES CARTES
rules.section.cards.text=Le jeu comporte 7 types de cartes : 1, 2, 3, 4, 5, 6 et LAMA (valeur 10). Il y a 8 exemplaires de chaque carte, soit 56 cartes en tout.
rules.section.turns.title=\uD83D\uDD04  DÉROULEMENT D'UN TOUR
rules.section.turns.text=À chaque tour, vous pouvez effectuer l'une des trois actions suivantes :
rules.bullet.play.title=JOUER UNE CARTE
rules.bullet.play.text=Posez une carte de votre main sur la défausse. Elle doit avoir la même valeur que la carte du dessus, ou la valeur immédiatement supérieure (ex : 3 sur 2). Cas spéciaux : LAMA se joue sur un 6, et 1 se joue sur un LAMA (cycle).

# Bullet Cards
rules.bullet.draw.title=PIOCHER UNE CARTE
rules.bullet.draw.text=Prenez une carte depuis la pioche et ajoutez-la à votre main. Votre tour se termine immédiatement.

rules.bullet.pass.title=PASSER LA MANCHE
rules.bullet.pass.text=Vous quittez la manche en cours. Vous ne jouerez plus jusqu'à la prochaine manche. Attention : les cartes restantes dans votre main vous seront déduites !

# Sections
rules.section.endround.title=\uD83D\uDCCA  FIN DE MANCHE
rules.section.endround.text=La manche se termine quand tous les joueurs ont passé ou qu'un joueur vide sa main. La valeur totale des cartes encore en main est déduite des crédits de chaque joueur.

rules.section.startround.title=\uD83D\uDD04  DÉBUT DE MANCHE
rules.section.startround.text=Au début de chaque manche, tous les joueurs reçoivent +35 crédits, y compris les joueurs en semestre de césure.

rules.section.jury.title=\u2696  LE JURY
rules.section.jury.text=Si vous perdez 20 crédits ou plus en une seule manche, vous êtes convoqué devant le jury. Vous choisissez une carte parmi 7 cartes face cachée (valeurs 1 à 6 et LAMA). Vous gagnez la valeur de la carte choisie en crédits.

rules.section.cesure.title=\u2708  SEMESTRE DE CÉSURE
rules.section.cesure.text=Si vos crédits sont négatifs après le jury, vous partez en semestre de césure. Vous sautez la prochaine manche mais recevez quand même les 35 crédits du début de manche. En mode 1v1, si les deux joueurs sont en césure, les deux sautent la manche simultanément.

rules.section.eras.title=\uD83C\uDF0D  SEMESTRE À L'ÉTRANGER
rules.section.eras.text=Si vous terminez une manche sans aucune carte en main, vous partez en semestre à l'étranger. À la manche suivante, vous commencez avec seulement 4 cartes au lieu de 6. Cet avantage n'est pas cumulable et ne dure qu'une seule manche.

rules.section.modes.title=\uD83C\uDF93  MODES DE JEU
rules.section.modes.text=Mode Court : 6 manches. Seuil honorifique : 180 crédits (équivalent d'une licence à l'UTBM).\nMode Long : 10 manches. Seuil honorifique : 300 crédits (master). Bonus DETEC : si vous avez \u2265 120 crédits à la fin de la manche 4, vous recevez +30 crédits.

rules.section.victory.title=\uD83C\uDFC6  VICTOIRE
rules.section.victory.text=À la fin de la dernière manche, le joueur avec le plus de crédits remporte la partie. Les seuils de 180 et 300 crédits sont honorifiques : ils signalent que vous êtes "diplômé" mais ne déterminent pas le gagnant.
